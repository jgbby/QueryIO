<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./css/popup.css">
    <title>QueryIO</title>
  </head>
  <body>
    <div class="bg">
      <div id="modal">
        <div class="modal-header">
          <img src="./img/icon128.png" alt="Logo">
          <div class="titleBG">
            <div class="title">Google Dorking</div>
          </div>
        </div>

        <div class="modal-content">
          <div class="op">
            Use * operator for any wildcard words<br>
            Use the | logical operator to signify 'OR'
          </div>

          <div class="container">
            <div class="row">
              <div class="field-card">
                <label for="text">Text</label>
                <input placeholder="e.g. William Shakespeare" id="text" type="text" aria-label="Text search">
              </div>
              <div class="field-card">
                <label for="site">Site</label>
                <input placeholder="e.g. example.com" id="site" type="text" aria-label="Site filter">
              </div>
            </div>

            <div class="row">
              <div class="field-card">
                <label for="allintitle">In Title</label>
                <input placeholder="e.g. Shakespeare" id="allintitle" type="text" aria-label="Title search">
              </div>
              <div class="field-card">
                <label for="allintext">In Text</label>
                <input placeholder="e.g. To be or not to be" id="allintext" type="text" aria-label="Body text search">
              </div>
            </div>

            <div class="row">
              <div class="field-card">
                <label for="inurl">In URL</label>
                <input placeholder="e.g. Elizabethan England" id="inurl" type="text" aria-label="URL search">
              </div>
              <div class="field-card">
                <label for="filetype">Filetype</label>
                <input placeholder="e.g. pdf" id="filetype" type="text" aria-label="File type filter">
              </div>
            </div>

            <div class="row">
              <div class="field-card">
                <label for="exclude">Exclude</label>
                <input placeholder="e.g. Rome" id="exclude" type="text" aria-label="Exclude words">
              </div>
              <div class="field-card">
                <label for="cache">Cached</label>
                <input placeholder="e.g. example/previous_version.com" id="cache" type="text" aria-label="Cached search">
              </div>
            </div>

            <div class="row">
              <div class="field-card full-width">
                <label for="link">Links</label>
                <input placeholder="e.g. en.wikipedia.org" id="link" type="text" aria-label="Link search">
              </div>
            </div>

            <div class="buttonRow">
              <button id="query" class="button" type="button">SEARCH</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./js/popup.js" defer></script>
  </body>
</html>
